server:
  port: 8080

spring:
  datasource:
    # --- DEFAULT: H2 (No Setup Required) ---
    url: jdbc:h2:mem:pmaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

pmay:
  slscode: UP23
  csscode: "9180"

# SFTP config (Disabled in normal dev, enabled in oracle mode)
sftp:
  host: ${SFTP_HOST:localhost}
  port: ${SFTP_PORT:2222}
  user: ${SFTP_USER:ifmisuser}
  password: ${SFTP_PASS:ifmispassword}
  remote-dir: ${SFTP_REMOTE:/incoming}
  ack-dir: ${SFTP_ACK:/outgoing}

logging:
  level:
    com.aparsh.api.pmay: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
# --- OPTIONAL: Oracle Mode (Use with -Dspring.profiles.active=oracle) ---
spring:
  config:
    activate:
      on-profile: oracle
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/FREE}
    username: ${DB_USER:pmay_user}
    password: ${DB_PASS:pmay_password}
    driver-class-name: oracle.jdbc.driver.OracleDriver
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
