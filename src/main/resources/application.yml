server:
  port: 8080

spring:
  datasource:
    url: jdbc:oracle:thin:@//<ORACLE_HOST>:1521/<SERVICE_NAME>
    username: pmay_user
    password: pmay_password
    driver-class-name: oracle.jdbc.driver.OracleDriver
  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

pmay:
  slscode: UP23
  csscode: "9180"

# SFTP config used by Spring Integration
sftp:
  host: sftp.example.com
  port: 22
  user: sftpuser
  password: sftppass
  remote-dir: /incoming
  ack-dir: /outgoing

# Jdbc security config uses the datasource above
